<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 200 265" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Bacteriophage infecting a bacterial cell">
<defs>
  <linearGradient id="hg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#FF9B2E"/>
    <stop offset="100%" stop-color="#C44400"/>
  </linearGradient>
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#D8EFE4"/>
    <stop offset="100%" stop-color="#A8D8BC"/>
  </linearGradient>
</defs>

<!-- ── PHAGE ─────────────────────────── -->

<!-- Head: flat-top hexagon -->
<polygon points="62,52 81,19 119,19 138,52 119,85 81,85"
         fill="url(#hg)" stroke="#7B2500" stroke-width="2"/>
<!-- Head top highlight -->
<polygon points="81,19 119,19 138,52 100,36" fill="rgba(255,255,255,0.15)"/>
<!-- Packaged DNA (horizontal lines) -->
<line x1="77" y1="36" x2="123" y2="36" stroke="rgba(255,255,255,0.35)" stroke-width="1.6" stroke-linecap="round"/>
<line x1="73" y1="46" x2="127" y2="46" stroke="rgba(255,255,255,0.35)" stroke-width="1.6" stroke-linecap="round"/>
<line x1="73" y1="56" x2="127" y2="56" stroke="rgba(255,255,255,0.35)" stroke-width="1.6" stroke-linecap="round"/>
<line x1="77" y1="66" x2="123" y2="66" stroke="rgba(255,255,255,0.28)" stroke-width="1.6" stroke-linecap="round"/>
<line x1="83" y1="76" x2="117" y2="76" stroke="rgba(255,255,255,0.22)" stroke-width="1.6" stroke-linecap="round"/>

<!-- Collar -->
<rect x="90" y="85" width="20" height="11" rx="1" fill="#7B2500"/>
<line x1="90" y1="91" x2="110" y2="91" stroke="rgba(255,255,255,0.14)" stroke-width="1.5"/>

<!-- Tail tube with striations -->
<rect x="94" y="96" width="12" height="56" rx="1" fill="#003870"/>
<line x1="95" y1="105" x2="105" y2="105" stroke="rgba(255,255,255,0.13)" stroke-width="1"/>
<line x1="95" y1="114" x2="105" y2="114" stroke="rgba(255,255,255,0.13)" stroke-width="1"/>
<line x1="95" y1="123" x2="105" y2="123" stroke="rgba(255,255,255,0.13)" stroke-width="1"/>
<line x1="95" y1="132" x2="105" y2="132" stroke="rgba(255,255,255,0.13)" stroke-width="1"/>
<line x1="95" y1="141" x2="105" y2="141" stroke="rgba(255,255,255,0.13)" stroke-width="1"/>

<!-- Baseplate -->
<rect x="83" y="152" width="34" height="8" rx="2" fill="#001e38"/>

<!-- Tail fibres: 3 left, 3 right — tips land on bacterium surface -->
<path d="M 85,155 Q 55,178 34,205" fill="none" stroke="#0071BC" stroke-width="2"   stroke-linecap="round"/>
<path d="M 87,158 Q 60,178 51,197" fill="none" stroke="#0071BC" stroke-width="1.6" stroke-linecap="round"/>
<path d="M 91,161 Q 72,177 63,193" fill="none" stroke="#0071BC" stroke-width="1.6" stroke-linecap="round"/>
<path d="M 115,155 Q 145,178 166,205" fill="none" stroke="#0071BC" stroke-width="2"   stroke-linecap="round"/>
<path d="M 113,158 Q 140,178 149,197" fill="none" stroke="#0071BC" stroke-width="1.6" stroke-linecap="round"/>
<path d="M 109,161 Q 128,177 137,193" fill="none" stroke="#0071BC" stroke-width="1.6" stroke-linecap="round"/>

<!-- Fibre tips (receptor-binding proteins) -->
<circle cx="34"  cy="205" r="3"   fill="#0071BC"/>
<circle cx="51"  cy="197" r="2.5" fill="#0071BC"/>
<circle cx="63"  cy="193" r="2.5" fill="#0071BC"/>
<circle cx="166" cy="205" r="3"   fill="#0071BC"/>
<circle cx="149" cy="197" r="2.5" fill="#0071BC"/>
<circle cx="137" cy="193" r="2.5" fill="#0071BC"/>

<!-- DNA injection channel (dashed, green) -->
<line x1="100" y1="160" x2="100" y2="190" stroke="#5ECDA6" stroke-width="2" stroke-dasharray="4,3"/>
<!-- Injection site marker on bacterium -->
<path d="M 95,190 L 105,190" stroke="#5ECDA6" stroke-width="2.5" stroke-linecap="round"/>

<!-- ── BACTERIUM ──────────────────────── -->

<!-- Cell body (cx=100, cy=221, rx=78, ry=31 → top at y=190) -->
<ellipse cx="100" cy="221" rx="78" ry="31" fill="url(#bg)" stroke="#2D9162" stroke-width="2.5"/>

<!-- Nucleoid (chromosome) loop -->
<ellipse cx="100" cy="221" rx="32" ry="13" fill="none" stroke="#2D9162" stroke-width="1.5" opacity="0.38"/>

<!-- DNA coils inside -->
<path d="M 74,221 Q 82,211 90,221 Q 98,231 106,221 Q 114,211 122,221 Q 129,227 134,221"
      fill="none" stroke="#2D9162" stroke-width="1.3" opacity="0.48"/>

<!-- Ribosomes -->
<circle cx="48"  cy="216" r="2.5" fill="#2D9162" opacity="0.28"/>
<circle cx="53"  cy="227" r="2"   fill="#2D9162" opacity="0.22"/>
<circle cx="150" cy="216" r="2.5" fill="#2D9162" opacity="0.28"/>
<circle cx="145" cy="227" r="2"   fill="#2D9162" opacity="0.22"/>
<circle cx="66"  cy="229" r="2"   fill="#2D9162" opacity="0.18"/>
<circle cx="133" cy="229" r="2"   fill="#2D9162" opacity="0.18"/>

</svg>
