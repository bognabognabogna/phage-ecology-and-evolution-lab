<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Social evolution and public goods dynamics in microbial communities">
<defs>
  <linearGradient id="sbg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#160024"/>
    <stop offset="100%" stop-color="#3a1068"/>
  </linearGradient>
  <radialGradient id="coop-fill" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#1A90D4" stop-opacity="0.45"/>
    <stop offset="100%" stop-color="#004F85" stop-opacity="0.15"/>
  </radialGradient>
  <radialGradient id="cheat-fill" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#E05E20" stop-opacity="0.45"/>
    <stop offset="100%" stop-color="#8B2000" stop-opacity="0.15"/>
  </radialGradient>
  <filter id="blur3">
    <feGaussianBlur stdDeviation="3"/>
  </filter>
  <filter id="glow3">
    <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>

<!-- Background -->
<rect width="800" height="600" fill="url(#sbg)"/>

<!-- Subtle hex-ish grid overlay -->
<g stroke="rgba(255,255,255,0.03)" stroke-width="0.8" fill="none">
