<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Prophage-mediated bacterial adaptation research graphic">
<defs>
  <linearGradient id="gbg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#001525"/>
    <stop offset="100%" stop-color="#003870"/>
  </linearGradient>
  <linearGradient id="phg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#1A90D4"/>
    <stop offset="100%" stop-color="#004F85"/>
  </linearGradient>
  <filter id="glow">
    <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="softglow">
    <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>

<!-- Background -->
<rect width="800" height="600" fill="url(#gbg)"/>

<!-- Subtle dot grid -->
<g fill="rgba(255,255,255,0.04)">
  <circle cx="50"  cy="50"  r="1.5"/><circle cx="150" cy="50"  r="1.5"/><circle cx="250" cy="50"  r="1.5"/>
  <circle cx="350" cy="50"  r="1.5"/><circle cx="450" cy="50"  r="1.5"/><circle cx="550" cy="50"  r="1.5"/>
  <circle cx="650" cy="50"  r="1.5"/><circle cx="750" cy="50"  r="1.5"/>
  <circle cx="50"  cy="150" r="1.5"/><circle cx="150" cy="150" r="1.5"/><circle cx="250" cy="150" r="1.5"/>
  <circle cx="350" cy="150" r="1.5"/><circle cx="450" cy="150" r="1.5"/><circle cx="550" cy="150" r="1.5"/>
  <circle cx="650" cy="150" r="1.5"/><circle cx="750" cy="150" r="1.5"/>
  <circle cx="50"  cy="250" r="1.5"/><circle cx="150" cy="250" r="1.5"/><circle cx="250" cy="250" r="1.5"/>
  <circle cx="350" cy="250" r="1.5"/><circle cx="450" cy="250" r="1.5"/><circle cx="550" cy="250" r="1.5"/>
  <circle cx="650" cy="250" r="1.5"/><circle cx="750" cy="250" r="1.5"/>
  <circle cx="50"  cy="350" r="1.5"/><circle cx="150" cy="350" r="1.5"/><circle cx="250" cy="350" r="1.5"/>
  <circle cx="350" cy="350" r="1.5"/><circle cx="450" cy="350" r="1.5"/><circle cx="550" cy="350" r="1.5"/>
  <circle cx="650" cy="350" r="1.5"/><circle cx="750" cy="350" r="1.5"/>
  <circle cx="50"  cy="450" r="1.5"/><circle cx="150" cy="450" r="1.5"/><circle cx="250" cy="450" r="1.5"/>
  <circle cx="350" cy="450" r="1.5"/><circle cx="450" cy="450" r="1.5"/><circle cx="550" cy="450" r="1.5"/>
  <circle cx="650" cy="450" r="1.5"/><circle cx="750" cy="450" r="1.5"/>
  <circle cx="50"  cy="550" r="1.5"/><circle cx="150" cy="550" r="1.5"/><circle cx="250" cy="550" r="1.5"/>
  <circle cx="350" cy="550" r="1.5"/><circle cx="450" cy="550" r="1.5"/><circle cx="550" cy="550" r="1.5"/>
  <circle cx="650" cy="550" r="1.5"/><circle cx="750" cy="550" r="1.5"/>
</g>

<!-- ── CHROMOSOME RING (centre 490, 295, r=145) ── -->
<!-- Main chromosome — green -->
<circle cx="490" cy="295" r="145" fill="none" stroke="#2D9162" stroke-width="26" opacity="0.70" filter="url(#softglow)"/>
<!-- Prophage 1 — vivid blue (top arc, ~90°) -->
<!-- from -90° (490,150) to 0° (635,295) — large arc flag 0 = minor arc -->
<path d="M 490,150 A 145,145 0 0,1 635,295"
      fill="none" stroke="#0071BC" stroke-width="28" stroke-linecap="round" filter="url(#glow)"/>
<!-- Prophage 2 — lighter blue (lower-left, ~45°) -->
<!-- from 150° (490-125.6,295+72.5)=(364,368) to 195° (490-140,295+37.5)=(350,333) -->
<path d="M 364,368 A 145,145 0 0,1 350,332"
      fill="none" stroke="#1A8CD8" stroke-width="22" stroke-linecap="round" opacity="0.65"/>

<!-- Chromosome glow centre -->
<circle cx="490" cy="295" r="100" fill="rgba(0,113,188,0.06)"/>
<circle cx="490" cy="295" r="5" fill="rgba(45,145,98,0.4)"/>

<!-- ── PHAGE above chromosome ── -->
<!-- Small phage, head at (490, 68), size ~28 -->
<polygon points="490,44 510,55 510,78 490,89 470,78 470,55"
         fill="url(#phg)" stroke="#002040" stroke-width="1.5"/>
<polygon points="470,55 510,55 490,44" fill="rgba(255,255,255,0.10)"/>
<line x1="480" y1="63" x2="500" y2="63" stroke="rgba(255,255,255,0.28)" stroke-width="1.3" stroke-linecap="round"/>
<line x1="477" y1="71" x2="503" y2="71" stroke="rgba(255,255,255,0.28)" stroke-width="1.3" stroke-linecap="round"/>
<line x1="480" y1="79" x2="500" y2="79" stroke="rgba(255,255,255,0.22)" stroke-width="1.3" stroke-linecap="round"/>
<rect x="486" y="89" width="8" height="4"  rx="1" fill="#002040"/>
<rect x="487" y="93" width="6" height="28" rx="1" fill="#003870"/>
<rect x="482" y="121" width="16" height="5" rx="1" fill="#001525"/>
<!-- Fibers (4, small) -->
<path d="M 482,124 Q 470,130 462,138" fill="none" stroke="#0071BC" stroke-width="1.2" stroke-linecap="round"/>
<path d="M 484,126 Q 474,133 468,142" fill="none" stroke="#0071BC" stroke-width="1"   stroke-linecap="round"/>
<path d="M 498,124 Q 510,130 518,138" fill="none" stroke="#0071BC" stroke-width="1.2" stroke-linecap="round"/>
<path d="M 496,126 Q 506,133 512,142" fill="none" stroke="#0071BC" stroke-width="1"   stroke-linecap="round"/>
<circle cx="462" cy="138" r="2.5" fill="#0071BC"/>
<circle cx="468" cy="142" r="2"   fill="#0071BC"/>
<circle cx="518" cy="138" r="2.5" fill="#0071BC"/>
<circle cx="512" cy="142" r="2"   fill="#0071BC"/>
<!-- Integration dashed line -->
<line x1="490" y1="126" x2="490" y2="150" stroke="#5ECDA6" stroke-width="1.8" stroke-dasharray="4,3"/>

<!-- ── ENVIRONMENT NODES (left column) ── -->

<!-- Node 1: Hospital -->
<circle cx="175" cy="148" r="60" fill="rgba(0,113,188,0.10)" stroke="rgba(0,113,188,0.30)" stroke-width="1.5"/>
<!-- Hospital cross -->
<rect x="166" y="121" width="18" height="54" rx="3" fill="rgba(220,60,60,0.75)"/>
<rect x="153" y="134" width="44" height="20" rx="3" fill="rgba(220,60,60,0.75)"/>
<!-- Genome mini-ring inside node -->
<circle cx="175" cy="148" r="34" fill="none" stroke="rgba(45,145,98,0.5)" stroke-width="4"/>
<path d="M 175,114 A 34,34 0 0,1 209,148" fill="none" stroke="rgba(0,113,188,0.8)" stroke-width="5" stroke-linecap="round"/>
<text x="175" y="228" text-anchor="middle" fill="rgba(255,255,255,0.72)" font-family="Montserrat,sans-serif" font-size="13" font-weight="700">Hospital</text>

<!-- Node 2: Community -->
<circle cx="148" cy="310" r="56" fill="rgba(45,145,98,0.10)" stroke="rgba(45,145,98,0.28)" stroke-width="1.5"/>
<!-- Person icon -->
<circle cx="148" cy="285" r="14" fill="rgba(94,205,166,0.6)"/>
<path d="M 120,324 Q 148,305 176,324" fill="rgba(94,205,166,0.5)" stroke="none"/>
<!-- Mini genome ring -->
<circle cx="148" cy="310" r="30" fill="none" stroke="rgba(45,145,98,0.45)" stroke-width="4"/>
<path d="M 148,280 A 30,30 0 0,1 178,310" fill="none" stroke="rgba(45,145,98,0.85)" stroke-width="5" stroke-linecap="round"/>
<text x="148" y="384" text-anchor="middle" fill="rgba(255,255,255,0.70)" font-family="Montserrat,sans-serif" font-size="13" font-weight="700">Community</text>

<!-- Node 3: Agricultural -->
<circle cx="185" cy="462" r="52" fill="rgba(94,205,166,0.08)" stroke="rgba(94,205,166,0.25)" stroke-width="1.5"/>
<!-- Leaf -->
<path d="M 185,436 Q 212,445 212,472 Q 185,474 185,436 Z" fill="rgba(94,205,166,0.50)"/>
<path d="M 185,436 Q 158,445 158,472 Q 185,474 185,436 Z" fill="rgba(45,145,98,0.50)"/>
<line x1="185" y1="436" x2="185" y2="476" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
<!-- Mini genome ring -->
<circle cx="185" cy="462" r="28" fill="none" stroke="rgba(94,205,166,0.40)" stroke-width="4"/>
<path d="M 185,434 A 28,28 0 0,1 213,462" fill="none" stroke="rgba(94,205,166,0.80)" stroke-width="5" stroke-linecap="round"/>
<text x="185" y="532" text-anchor="middle" fill="rgba(255,255,255,0.68)" font-family="Montserrat,sans-serif" font-size="13" font-weight="700">Agricultural</text>

<!-- ── CONNECTING LINES (nodes → chromosome) ── -->
<!-- Hospital (175,148) → chromosome surface ~210°: (490-125,295-72)=(365,223) -->
<line x1="234" y1="155" x2="360" y2="224" stroke="rgba(255,255,255,0.16)" stroke-width="1.2" stroke-dasharray="7,5"/>
<circle cx="272" cy="166" r="3.5" fill="#0071BC" opacity="0.6"/>
<circle cx="310" cy="181" r="4"   fill="#0071BC" opacity="0.75"/>
<circle cx="340" cy="204" r="3.5" fill="#0071BC" opacity="0.6"/>

<!-- Community (148,310) → chromosome surface 180°: (345,295) -->
<line x1="203" y1="310" x2="340" y2="295" stroke="rgba(255,255,255,0.16)" stroke-width="1.2" stroke-dasharray="7,5"/>
<circle cx="240" cy="307" r="3.5" fill="#2D9162" opacity="0.6"/>
<circle cx="276" cy="303" r="4"   fill="#2D9162" opacity="0.75"/>
<circle cx="310" cy="299" r="3.5" fill="#2D9162" opacity="0.6"/>

<!-- Agricultural (185,462) → chromosome surface ~160°: (354,344) -->
<line x1="235" y1="443" x2="352" y2="348" stroke="rgba(255,255,255,0.16)" stroke-width="1.2" stroke-dasharray="7,5"/>
<circle cx="264" cy="420" r="3.5" fill="#5ECDA6" opacity="0.6"/>
<circle cx="296" cy="394" r="4"   fill="#5ECDA6" opacity="0.75"/>
<circle cx="325" cy="369" r="3.5" fill="#5ECDA6" opacity="0.6"/>

<!-- ── STATS BADGE (top right) ── -->
<rect x="590" y="28" width="188" height="90" rx="12" fill="rgba(0,113,188,0.15)" stroke="rgba(0,113,188,0.38)" stroke-width="1.5"/>
<text x="684" y="62"  text-anchor="middle" fill="white"                  font-family="Montserrat,sans-serif" font-size="30" font-weight="800">4,010</text>
<text x="684" y="84"  text-anchor="middle" fill="rgba(255,255,255,0.68)" font-family="Montserrat,sans-serif" font-size="13">Klebsiella genomes</text>
<text x="684" y="103" text-anchor="middle" fill="rgba(255,255,255,0.48)" font-family="Montserrat,sans-serif" font-size="11">analysed</text>

<!-- Prophage legend labels -->
<rect x="590" y="145" width="188" height="78" rx="10" fill="rgba(0,0,0,0.22)"/>
<line x1="606" y1="166" x2="636" y2="166" stroke="#0071BC" stroke-width="5" stroke-linecap="round"/>
<text x="644" y="170" fill="rgba(255,255,255,0.75)" font-family="Montserrat,sans-serif" font-size="12" font-weight="600">Prophage region</text>
<line x1="606" y1="196" x2="636" y2="196" stroke="#2D9162" stroke-width="5" stroke-linecap="round" opacity="0.8"/>
<text x="644" y="200" fill="rgba(255,255,255,0.75)" font-family="Montserrat,sans-serif" font-size="12" font-weight="600">Bacterial chromosome</text>

<!-- Bottom label bar -->
<rect x="0" y="564" width="800" height="36" fill="rgba(0,0,0,0.30)"/>
<text x="400" y="587" text-anchor="middle" fill="rgba(255,255,255,0.52)" font-family="Montserrat,sans-serif" font-size="11" font-weight="700" letter-spacing="0.08em">COMPARATIVE GENOMICS  ·  BIOINFORMATICS  ·  MACHINE LEARNING</text>

</svg>
